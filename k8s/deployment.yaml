apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-api
  template:
    metadata:
      labels:
        app: ml-api
    spec:
      containers:
      - name: ml-api-container
        image: local-ml-api:v2
        imagePullPolicy: Never # Forces K8s to use the local image we will build
        ports:
        - containerPort: 8000