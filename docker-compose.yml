version: "3.8"
services:
  localstack:
    image: localstack/localstack:latest
    container_name: mock-aws-cloud
    ports:
      - "4566:4566"            # AWS Gateway API
      - "4510-4559:4510-4559"  # External services port range
    environment:
      - SERVICES=s3            # We only need S3 for the model artifacts
      - DEBUG=1
    volumes:
      - "./localstack-data:/var/lib/localstack" # Persistence
      - "/var/run/docker.sock:/var/run/docker.sock"